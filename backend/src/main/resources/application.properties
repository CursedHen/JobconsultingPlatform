# ======================================================
# 1. Database Configuration (H2 In-Memory)
# ======================================================
spring.datasource.url=jdbc:h2:mem:jobdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (Access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# ======================================================
# 2. System Settings
# ======================================================
# Prevent the app from stopping if a runner fails
spring.main.terminate-on-registration-errors=false
server.port=8080

# ======================================================
# 3. Groq AI Integration (Hardcoded for Demo)
# ======================================================
# Pointing Spring AI to the Groq Endpoint
spring.ai.openai.base-url=https://api.groq.com/openai/


# Model Selection: Llama 3.3 is highly capable for cover letters
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile