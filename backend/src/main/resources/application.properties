# ======================================================
# 1. Database Configuration (PostgreSQL)
# ======================================================
spring.datasource.url=jdbc:postgresql://postgres:5432/job_consulting
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=username
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ======================================================
# 2. System Settings
# ======================================================
# Prevent the app from stopping if a runner fails
spring.main.terminate-on-registration-errors=false
server.port=8080

# ======================================================
# 3. Groq AI Integration (Hardcoded for Demo)
# ======================================================
# Pointing Spring AI to the Groq Endpoint
spring.ai.openai.base-url=https://api.groq.com/openai/
spring.ai.openai.api-key=YOUR_ACTUAL_GROQ_API_KEY



# Model Selection: Llama 3.3 is highly capable for cover letters
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile